name: run-tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.3'
            illuminate: '^11.0'
            testbench: '^9.0'
          - php: '8.3'
            illuminate: '^12.0'
            testbench: '^10.0'
          - php: '8.4'
            illuminate: '^12.0'
            testbench: '^10.0'
          - php: '8.4'
            illuminate: '^13.0'
            testbench: '^11.0'
          - php: '8.5'
            illuminate: '^13.0'
            testbench: '^11.0'

    name: PHP ${{ matrix.php }} · Laravel ${{ matrix.illuminate }}

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: scout_postgres_test
        ports: ['5432:5432']
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo_pgsql, mbstring, intl
          coverage: pcov

      - name: Install Composer dependencies
        env:
          ILLUMINATE_VERSION: ${{ matrix.illuminate }}
          TESTBENCH_VERSION: ${{ matrix.testbench }}
        run: |
          composer update --prefer-dist --no-progress --no-interaction \
            --with="illuminate/contracts:${ILLUMINATE_VERSION}" \
            --with="illuminate/database:${ILLUMINATE_VERSION}" \
            --with="illuminate/support:${ILLUMINATE_VERSION}" \
            --with="orchestra/testbench:${TESTBENCH_VERSION}"

      - name: Pint (lint, no auto-fix in CI)
        run: vendor/bin/pint --test

      - name: Rector (dry-run, no auto-fix in CI)
        run: vendor/bin/rector --dry-run --no-diffs

      - name: PHPStan
        run: vendor/bin/phpstan analyse --no-progress --memory-limit=512M

      - name: Pest
        run: vendor/bin/pest --ci
        if: ${{ !(matrix.php == '8.5' && matrix.illuminate == '^13.0') }}
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: scout_postgres_test
          DB_USERNAME: postgres
          DB_PASSWORD: postgres

      - name: Pest (with coverage)
        run: vendor/bin/pest --ci --coverage --coverage-clover=coverage.xml
        if: ${{ matrix.php == '8.5' && matrix.illuminate == '^13.0' }}
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: scout_postgres_test
          DB_USERNAME: postgres
          DB_PASSWORD: postgres

      - name: Upload coverage to Codecov
        if: ${{ matrix.php == '8.5' && matrix.illuminate == '^13.0' }}
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
