name: run-tests

on:
  push:
    branches: [main]
    paths: ['packages/apex-scout/scout-postgres/**']
  pull_request:
    branches: [main]
    paths: ['packages/apex-scout/scout-postgres/**']

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: scout_postgres_test
        ports: ['5432:5432']
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    defaults:
      run:
        working-directory: packages/apex-scout/scout-postgres

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.5
          extensions: pdo_pgsql, mbstring, intl
          coverage: none

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Pint (lint, no auto-fix in CI)
        run: vendor/bin/pint --test

      - name: Rector (dry-run, no auto-fix in CI)
        run: vendor/bin/rector --dry-run --no-diffs

      - name: PHPStan
        run: vendor/bin/phpstan analyse --no-progress --memory-limit=512M

      - name: Pest
        run: vendor/bin/pest --ci
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: scout_postgres_test
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
